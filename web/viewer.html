<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>eabrain viewer</title>
<style>
  :root {
    --base: #1e1e2e;
    --mantle: #181825;
    --crust: #11111b;
    --surface0: #313244;
    --surface1: #45475a;
    --overlay: #6c7086;
    --text: #cdd6f4;
    --subtext: #a6adc8;
    --teal: #94e2d5;
    --lavender: #b4befe;
    --mauve: #cba6f7;
    --green: #a6e3a1;
    --yellow: #f9e2af;
    --red: #f38ba8;
    --peach: #fab387;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--base);
    color: var(--text);
    font-family: ui-monospace, "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
    font-size: 13px;
    display: grid;
    grid-template-rows: auto 1fr;
    grid-template-columns: 360px 1fr;
    grid-template-areas: "topbar topbar" "left right";
  }
  header {
    grid-area: topbar;
    background: var(--mantle);
    border-bottom: 1px solid var(--surface0);
    padding: 10px 14px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  header .title { color: var(--lavender); font-weight: 600; margin-right: 12px; }
  header .stats { color: var(--subtext); font-size: 12px; margin-right: auto; }
  header input, header select {
    background: var(--surface0);
    color: var(--text);
    border: 1px solid var(--surface1);
    border-radius: 4px;
    padding: 5px 8px;
    font-family: inherit;
    font-size: 12px;
  }
  header input:focus, header select:focus { outline: none; border-color: var(--lavender); }
  header input.search { width: 280px; }
  aside {
    grid-area: left;
    background: var(--mantle);
    border-right: 1px solid var(--surface0);
    overflow-y: auto;
    padding: 8px;
  }
  main { grid-area: right; overflow-y: auto; padding: 16px 20px; }
  .session {
    background: var(--surface0);
    border-radius: 6px;
    margin-bottom: 8px;
    padding: 8px 10px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .session:hover { background: var(--surface1); }
  .session .when { color: var(--subtext); font-size: 11px; }
  .session .project { color: var(--teal); font-size: 11px; margin-left: 6px; }
  .session .summary {
    color: var(--text);
    margin-top: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .session .obs-count { color: var(--overlay); font-size: 11px; margin-top: 3px; }
  .session.active {
    background: var(--surface1);
    border-left: 3px solid var(--lavender);
  }
  .obs {
    background: var(--mantle);
    border-left: 3px solid var(--surface1);
    border-radius: 3px;
    margin: 6px 0;
    padding: 8px 12px;
    cursor: pointer;
  }
  .obs:hover { border-left-color: var(--lavender); }
  .obs .type {
    display: inline-block;
    border-radius: 3px;
    padding: 1px 6px;
    font-size: 11px;
    margin-right: 8px;
    color: var(--crust);
  }
  .type-decision { background: var(--lavender); }
  .type-bug { background: var(--red); }
  .type-architecture { background: var(--mauve); }
  .type-pattern { background: var(--green); }
  .type-error { background: var(--peach); }
  .type-note { background: var(--subtext); }
  .obs .content {
    color: var(--text);
    margin-top: 4px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .panel-title {
    color: var(--lavender);
    font-weight: 600;
    margin: 0 0 12px 0;
    border-bottom: 1px solid var(--surface0);
    padding-bottom: 6px;
  }
  .empty {
    color: var(--overlay);
    text-align: center;
    margin-top: 40px;
    font-style: italic;
  }
  .meta { color: var(--subtext); font-size: 11px; margin-bottom: 8px; }
</style>
</head>
<body>
<header>
  <span class="title">eabrain viewer</span>
  <span class="stats" id="stats">loading…</span>
  <input class="search" id="search" type="text" placeholder="search observations…">
  <select id="project-filter"><option value="">all projects</option></select>
  <select id="type-filter">
    <option value="">all types</option>
    <option value="decision">decision</option>
    <option value="bug">bug</option>
    <option value="architecture">architecture</option>
    <option value="pattern">pattern</option>
    <option value="error">error</option>
    <option value="note">note</option>
  </select>
</header>
<aside id="left">
  <h3 class="panel-title">Timeline</h3>
  <div id="timeline"></div>
</aside>
<main id="right">
  <div class="empty">Click a session or search to view observations.</div>
</main>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
const left = $("timeline");
const right = $("right");
const statsEl = $("stats");
const searchEl = $("search");
const projectFilter = $("project-filter");
const typeFilter = $("type-filter");

let allTimeline = [];

function el(tag, opts) {
  const node = document.createElement(tag);
  if (!opts) return node;
  if (opts.cls) node.className = opts.cls;
  if (opts.text != null) node.textContent = String(opts.text);
  if (opts.dataset) for (const k in opts.dataset) node.dataset[k] = opts.dataset[k];
  if (opts.attrs) for (const k in opts.attrs) node.setAttribute(k, opts.attrs[k]);
  return node;
}

function clear(node) {
  while (node.firstChild) node.removeChild(node.firstChild);
}

async function fetchJson(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(String(r.status));
  return await r.json();
}

function renderObs(o) {
  const wrap = el("div", { cls: "obs", dataset: { id: o.id || "" } });
  const t = String(o.type || "note");
  wrap.appendChild(el("span", { cls: "type type-" + t.replace(/[^a-z]/gi, ""), text: t }));
  wrap.appendChild(el("span", { cls: "meta", text: String(o.created_at || "").slice(0, 16) }));
  wrap.appendChild(el("div", { cls: "content", text: o.content || "" }));
  return wrap;
}

function renderTimeline(entries) {
  clear(left);
  if (!entries.length) {
    left.appendChild(el("div", { cls: "empty", text: "No sessions." }));
    return;
  }
  entries.forEach((entry, i) => {
    const s = entry.session;
    const node = el("div", { cls: "session", dataset: { i: String(i) } });
    const head = el("div");
    head.appendChild(el("span", { cls: "when", text: String(s.started_at || "").slice(0, 16) }));
    head.appendChild(el("span", { cls: "project", text: s.project || "" }));
    node.appendChild(head);
    node.appendChild(el("div", { cls: "summary", text: s.summary || "(in progress)" }));
    const n = entry.observations.length;
    node.appendChild(el("div", { cls: "obs-count", text: n + " observation" + (n === 1 ? "" : "s") }));
    node.addEventListener("click", () => {
      left.querySelectorAll(".session").forEach(x => x.classList.remove("active"));
      node.classList.add("active");
      showSession(entry);
    });
    left.appendChild(node);
  });
}

function showSession(entry) {
  const s = entry.session;
  const obs = entry.observations;
  clear(right);
  right.appendChild(el("h3", { cls: "panel-title", text: "Session " + (s.project || "") }));
  right.appendChild(el("div", { cls: "meta", text: "Started: " + (s.started_at || "") }));
  right.appendChild(el("div", { cls: "meta", text: "Ended: " + (s.ended_at || "(open)") }));
  right.appendChild(el("div", { cls: "meta", text: "Summary: " + (s.summary || "—") }));
  if (!obs.length) {
    right.appendChild(el("div", { cls: "empty", text: "No observations." }));
    return;
  }
  const list = el("div");
  obs.forEach(o => list.appendChild(renderObs(o)));
  right.appendChild(list);
}

function showSearch(q, results) {
  clear(right);
  if (!results.length) {
    right.appendChild(el("h3", { cls: "panel-title", text: 'Search: "' + q + '"' }));
    right.appendChild(el("div", { cls: "empty", text: "No matches." }));
    return;
  }
  right.appendChild(el("h3", {
    cls: "panel-title",
    text: 'Search: "' + q + '" — ' + results.length + " match" + (results.length === 1 ? "" : "es")
  }));
  const list = el("div");
  results.forEach(o => list.appendChild(renderObs(o)));
  right.appendChild(list);
}

function applyFilters() {
  const proj = projectFilter.value;
  const type = typeFilter.value;
  let entries = allTimeline;
  if (proj) entries = entries.filter(e => e.session.project === proj);
  if (type) {
    entries = entries
      .map(e => ({ session: e.session, observations: e.observations.filter(o => o.type === type) }))
      .filter(e => e.observations.length > 0);
  }
  renderTimeline(entries);
}

async function loadAll() {
  try {
    const [stats, timeline] = await Promise.all([
      fetchJson("/api/stats"),
      fetchJson("/api/timeline?last=200"),
    ]);
    statsEl.textContent = stats.observation_count + " obs · " + stats.session_count +
      " sessions · " + Math.round(stats.db_size_bytes / 1024) + "KB";
    allTimeline = timeline;
    const projects = new Set(timeline.map(e => e.session.project).filter(Boolean));
    clear(projectFilter);
    projectFilter.appendChild(el("option", { attrs: { value: "" }, text: "all projects" }));
    [...projects].sort().forEach(p => {
      projectFilter.appendChild(el("option", { attrs: { value: p }, text: p }));
    });
    applyFilters();
  } catch (e) {
    statsEl.textContent = "error: " + e.message;
  }
}

searchEl.addEventListener("keydown", async (ev) => {
  if (ev.key !== "Enter") return;
  const q = searchEl.value.trim();
  if (!q) {
    clear(right);
    right.appendChild(el("div", { cls: "empty", text: "Click a session or search to view observations." }));
    return;
  }
  try {
    const data = await fetchJson("/api/search?q=" + encodeURIComponent(q));
    showSearch(q, data.observations || []);
  } catch (e) {
    clear(right);
    right.appendChild(el("div", { cls: "empty", text: "search error: " + e.message }));
  }
});

projectFilter.addEventListener("change", applyFilters);
typeFilter.addEventListener("change", applyFilters);

loadAll();
</script>
</body>
</html>
